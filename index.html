var tFrac=Math.sin(time*.12)*.5+.5;
trainGroup.position.set(tP1.x+tDx*tFrac,0,tP1.z+tDz*tFrac);
if(Math.floor(time*6)%2===0){var sp=smokeParts[smokeIdx%smokeParts.length];sp.mesh.visible=true;sp.life=1;sp.mesh.position.set(trainGroup.position.x,2.2,trainGroup.position.z);sp.vx=(Math.random()-.5)*.015;sp.vy=.035+Math.random()*.02;sp.vz=(Math.random()-.5)*.015;smokeIdx++}
for(var i=0;i<smokeParts.length;i++){var sp=smokeParts[i];if(sp.life>0){sp.life-=.006;sp.mesh.position.x+=sp.vx;sp.mesh.position.y+=sp.vy;sp.mesh.position.z+=sp.vz;sp.mesh.material.opacity=sp.life*.35;sp.mesh.scale.setScalar(1+(1-sp.life)*2.5);if(sp.life<=0)sp.mesh.visible=false}}
// People animation
for(var i=0;i<people.length;i++){var p=people[i];var t2=(time*p.speed+p.offset)%2;var f=t2<1?t2:2-t2;p.mesh.position.x=p.p1.x+p.dx*f;p.mesh.position.z=p.p1.z+p.dz*f;if(p.type==='pick'){p.mesh.position.y=Math.abs(Math.sin(time*p.speed*3))*.08}else{p.mesh.position.y=Math.abs(Math.sin(time*p.speed*6))*.02}}
for(var i=0;i<dogData.length;i++){var d=dogData[i];var a=time*d.speed+d.offset;d.mesh.position.x=d.cx+Math.sin(a)*d.radius;d.mesh.position.z=d.cz+Math.cos(a)*d.radius;d.mesh.rotation.y=a+Math.PI/2;if(d.mesh.children[4])d.mesh.children[4].rotation.z=Math.sin(time*8)*.3}
for(var i=0;i<clouds.length;i++){clouds[i].position.x+=.005;if(clouds[i].position.x>100)clouds[i].position.x=-100}
// Credit fade in
if(time>3&&phase===0){phase=1;document.getElementById('credit').style.opacity='1'}
R.render(S,cam)}
animate();
addEventListener('resize',function(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
})();
</script>
